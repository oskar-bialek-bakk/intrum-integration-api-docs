site_name: DEBT Manager — API Integracyjne
site_description: Dokumentacja techniczna API integracyjnego DEBT Manager
site_url: https://oskar-bialek-bakk.github.io/intrum-integration-api-docs/

theme:
  name: material
  language: pl
  font:
    text: Source Sans 3
    code: JetBrains Mono
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Tryb jasny
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Tryb ciemny

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      lang: pl
  - drawio

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: docs
  - tables
  - attr_list
  - md_in_html

nav:
  - index.md
  - Założenia:
    - zalozenia/index.md
    - Konfiguracja kontrahenta: zalozenia/konfiguracja-kontrahenta.md
    - Procedura importów: zalozenia/procedura-importow.md
    - Architektura fizyczna: architektura/index.md
    - Kolejki: kolejki/index.md
  - Funkcje API:
    - funkcje-api/index.md
    - Importy:
      - funkcje-api/importy/index.md
      - ImportFromFileUpload: funkcje-api/importy/import-from-file-upload.md
      - ImportFromFileShare: funkcje-api/importy/import-from-file-share.md
      - GetImportStatus: funkcje-api/importy/get-import-status.md
      - GetObjectStatusByID: funkcje-api/importy/get-object-status-by-id.md
      - GetImportFile: funkcje-api/importy/get-import-file.md
      - GetImportFileFromFileShare: funkcje-api/importy/get-import-file-from-file-share.md
      - EnqueImportMessage: funkcje-api/importy/enque-import-message.md
      - RefreshDictionaries: funkcje-api/importy/refresh-dictionaries.md
      - SetImportStep: funkcje-api/importy/set-import-step.md
      - GetDictionaries: funkcje-api/importy/get-dictionaries.md
      - GetMailRecipients: funkcje-api/importy/get-mail-recipients.md
      - SetImportValidations: funkcje-api/importy/set-import-validations.md
      - GetMailRecipientsForImportType: funkcje-api/importy/get-mail-recipients-for-import-type.md
  - Komunikaty:
    - komunikaty/index.md
    - Case: komunikaty/case.md
    - CaseContactData: komunikaty/case-contact-data.md
    - Customer: komunikaty/customer.md
    - Contract: komunikaty/contract.md
    - ContractBalance: komunikaty/contract-balance.md
    - Balance: komunikaty/balance.md
    - Payment: komunikaty/payment.md
    - Adjustment: komunikaty/adjustment.md
    - Action: komunikaty/action.md
    - AttributeCase: komunikaty/attribute-case.md
    - AttributeDebtor: komunikaty/attribute-debtor.md
    - Signature: komunikaty/signature.md
    - Cache: komunikaty/cache.md
    - RemoveCase: komunikaty/remove-case.md
  - Przypadki użycia:
    - przypadki-uzycia/index.md
    - Import pliku testowego: przypadki-uzycia/import-pliku-testowego.md
    - Zasilenie bez pliku: przypadki-uzycia/zasilenie-bez-pliku.md
    - Nowy typ importu: przypadki-uzycia/nowy-typ-importu.md
